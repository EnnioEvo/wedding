<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="only light">
    <title>RSVP matrimonio - Ennio e Miriam</title>
    <link rel="stylesheet" href="../lovio_files/css.css">
    <link rel="stylesheet" href="print.css">
    <style>
      @page {
        size: 4.7in 3.5in;
        margin: 0;
      }

      html,
      body {
        width: 4.7in;
        min-height: 3.5in;
      }
    </style>
  </head>
  <body class="print-body rsvp-body">
    <main class="print-sheet rsvp-sheet" aria-label="RSVP matrimonio Ennio e Miriam">
      <img
        class="rsvp-sprig rsvp-sprig-top"
        src="../assets/images/decor/flower-five.png"
        alt=""
        aria-hidden="true"
      >
      <img
        class="rsvp-sprig rsvp-sprig-bottom"
        src="../assets/images/decor/edera_vertical_2.png"
        alt=""
        aria-hidden="true"
      >

      <section class="rsvp-copy">
        <p class="kicker">La tua conferma</p>
        <h1>RSVP</h1>
        <p class="rsvp-text">Scansiona il codice oppure visita miriamedennio.love</p>
        <p class="rsvp-deadline">Ti chiediamo di confermare entro il 31 Agosto 2026</p>
        <p class="rsvp-extra">Potrai indicare anche eventuale interesse per la navetta.</p>
        <div class="small-rule" aria-hidden="true"></div>
        <p class="rsvp-monogram">Ennio e Miriam</p>
      </section>

      <section class="qr-area" aria-label="Codice QR per confermare la presenza">
        <img class="qr-code" src="../assets/print/rsvp-qr.svg" alt="QR code per miriamedennio.love">
        <p>miriamedennio.love</p>
      </section>
    </main>
  </body>
</html>
