<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="only light">
    <title>Invito matrimonio - Ennio e Miriam</title>
    <link rel="stylesheet" href="../lovio_files/css.css">
    <link rel="stylesheet" href="print.css">
    <style>
      @page {
        size: 5in 7in;
        margin: 0;
      }

      html,
      body {
        width: 5in;
        min-height: 7in;
      }
    </style>
  </head>
  <body class="print-body invitation-body">
    <main class="print-sheet invitation-sheet" aria-label="Invito matrimonio Ennio e Miriam">
      <img
        class="botanical botanical-top-right"
        src="../assets/images/decor/edera_vertical_4.png"
        alt=""
        aria-hidden="true"
      >
      <img
        class="botanical botanical-bottom-left"
        src="../assets/images/decor/edera_vertical_1.png"
        alt=""
        aria-hidden="true"
      >

      <section class="invitation-content">
        <div class="hairline" aria-hidden="true"></div>
        <img class="rings-mark" src="../assets/images/decor/rings.png" alt="" aria-hidden="true">

        <p class="announcement">Siamo lieti di annunciarvi il nostro matrimonio</p>
        <h1>Ennio <span>e</span> Miriam</h1>

        <div class="date-block">
          <p>Sabato</p>
          <strong>17 Ottobre 2026</strong>
        </div>

        <div class="details-group" aria-label="Dettagli della cerimonia e del ricevimento">
          <p>
            <span>Cerimonia ore 10:30</span>
            Chiesa Santa Maria della Pietà, Palermo
          </p>
          <p>
            <span>A seguire ricevimento</span>
            Baglio della Luna, Partinico
          </p>
        </div>
      </section>
    </main>
  </body>
</html>
